name: Deploy game to GitHub Pages

# Optional: this can publish the game using the "GitHub Actions" Pages source.
# The simplest setup (see README) is "Deploy from a branch", which does NOT
# need this workflow. To avoid failed runs when Pages isn't set to the
# "GitHub Actions" source, this only runs when you start it by hand from the
# Actions tab (or if you switch the trigger back to "push").
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only keep the newest deploy running.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Get the files
        uses: actions/checkout@v4

      - name: Prepare for Pages
        uses: actions/configure-pages@v5

      - name: Package the website
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."          # the whole repo root (index.html lives here)

      - name: Publish
        id: deployment
        uses: actions/deploy-pages@v4
